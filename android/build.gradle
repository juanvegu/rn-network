plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.rnnetwork'
version = '0.1.0'

android {
  namespace "expo.modules.rnnetwork"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation 'com.scotia:network-contracts:1.0.0'
}
